name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: SonamNarula
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          config_output: svg
          filename: metrics.svg
          config_padding: 10
